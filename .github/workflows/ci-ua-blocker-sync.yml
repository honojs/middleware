name: Sync robots.json

on:
  schedule:
    # Runs every day at midnight
    - cron: '15 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-and-pr:
    if: ${{ !github.event.repository.fork }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          cache: true
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .tool-versions

      - run: pnpm install --filter @hono/ua-blocker

      - name: Fetch latest robots.json
        run: pnpm --filter @hono/ua-blocker getrobotstxt

      - name: Generate data
        run: pnpm --filter @hono/ua-blocker prebuild

      - name: Format
        run: pnpm prettier --write "packages/ua-blocker"

      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate changeset
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          # Use a static changeset filename to avoid duplicates
          CHANGESET_FILE=".changeset/auto-sync-robots.md"

          # Create the changeset file
          cat << EOF > "$CHANGESET_FILE"
          ---
          '@hono/ua-blocker': patch
          ---

          chore(ua-blocker): sync \`robots.json\` with upstream
          EOF

      - name: Create Pull Request if changes exist
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(ua-blocker): update robots.json from upstream'
          title: 'chore(ua-blocker): update robots.json from upstream'
          body: 'This PR was automatically created after detecting changes in the upstream `robots.json` file.'
          branch: 'chore/sync-robots-json'
          delete-branch: true
          # Assignee and labels
          assignees: finxol
          reviewers: finxol
          labels: robots.json
