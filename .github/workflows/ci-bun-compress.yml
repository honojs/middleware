name: ci-bun-compress
on:
  push:
    branches: [main]
    paths:
      - 'packages/bun-compress/**'
  pull_request:
    branches: ['*']
    paths:
      - 'packages/bun-compress/**'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: [1.3.2, 1.3.3]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          cache: true
      - run: pnpm install --filter @hono/bun-compress
      - run: pnpm turbo --filter @hono/bun-compress build
      - run: bun test packages/bun-compress --coverage --coverage-reporter lcov
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          fail_ci_if_error: true
          directory: ./coverage
          flags: bun-compress
